{% extends 'base.html' %}
{% block title %}
    <h1>Editar Pessoa</h1>
{% endblock title %}
{% block content %}
    <form id="pessoa" method="post" action="{% url 'aula:funcao_pessoa_editar' pessoa.id%}">
        {% csrf_token %}
        {{ formulario.as_p }}
        <button type="submit" class="btn btn-outline-success btn-lg" form="pessoa"> Editar</button>
        <button type="reset" class="btn btn-outline-danger btn-lg" form="pessoa">Limpar</button>

            <a type="reset" class="btn btn-outline-secondary" role='button' title='Cancelar' href="{% url 'aula:funcao_pessoa_listar' %}">
            Cancelar
            </a>
    </form>
{% endblock content %}
